pose_stream_node:
  ros__parameters:
    project_root: ""
    infer_config: configs/infer_pose_stream.yaml
    event_topic: /perception/events
    input_mode: mock
    mock_publish_period_sec: 1.0
    heartbeat_interval_sec: 2.0
    video_file_path: ""
    camera_device: ""
    camera_index: -1
    ros_image_topic: /camera/image_raw
    ros_image_timeout_sec: 3.0
    visualization_enabled: false
    visualization_topic: /perception/debug_image
    supervisor_status_topic: /system/supervisor/status
    reobserve_visible_keypoint_threshold: 6
