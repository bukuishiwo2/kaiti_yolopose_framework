data:
  dataset: data/processed/urfall_pose_sequences.npz

model:
  type: tcn
  hidden_dim: 128
  num_layers: 4
  dropout: 0.2
  tcn_kernel_size: 3

train:
  device: 0
  batch_size: 64
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  threshold: 0.5

output:
  checkpoint: models/fall_sequence_tcn.pt
