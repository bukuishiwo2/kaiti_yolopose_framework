data:
  dataset: data/processed/urfall_plus_fallvision_nofall_sampled_sequences.npz

model:
  hidden_dim: 128
  num_layers: 2
  dropout: 0.2
  bidirectional: false

train:
  device: 0
  batch_size: 64
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  threshold: 0.5

output:
  checkpoint: models/fall_sequence_lstm_urfall_plus_fallvision_nofall_sampled.pt
